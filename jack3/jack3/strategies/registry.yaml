strategies:

  first_hour_verdict:
    description: "Trades the direction confirmed by the first hour (10:00-10:15) move"
    indicators_needed: ["ema", "rsi", "atr", "vwap", "first_hour"]
    time_window: "10:15-11:15"
    regime: ["trending_strong", "trending_weak", "normal"]
    thresholds:
      min_fh_move_pct: 0.3
      min_rsi_bull: 55
      max_rsi_bear: 45
      atr_stop_multiplier: 0.5
      atr_target_multiplier: 2.0
    risk:
      atr_stop_multiplier: 0.5
      atr_target_multiplier: 2.0
    effectiveness:
      win_rate_20d: null
      avg_rr: null
      best_regime: "trending_strong"
      total_trades_20d: 0
      last_updated: null

